<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tangle Ropes — Braiding Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #2c1810;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: linear-gradient(180deg, #3d2415 0%, #2c1810 100%);
  height: 56px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
#header-left { display: flex; align-items: center; gap: 16px; }
#game-title { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #f5c563; }
#home-link { color: #8a7060; text-decoration: none; font-size: 13px; }
#debug {
  font-size: 13px; color: #8a7060; font-family: monospace;
}
#debug .val { color: #f5c563; font-weight: 600; }
#debug .label { color: #6a5a4a; }
button.reset-btn {
  background: rgba(255,255,255,0.06); color: #8a7060;
  border: 1px solid rgba(255,255,255,0.1); padding: 6px 16px;
  border-radius: 6px; cursor: pointer; font-size: 13px;
}
button.reset-btn:hover { background: rgba(255,255,255,0.1); color: #c8a882; }
canvas { display: block; cursor: default; touch-action: none; }
canvas.can-grab { cursor: grab; }
canvas.dragging { cursor: grabbing; }
</style>
</head>
<body>
<div id="header">
  <div id="header-left">
    <a id="home-link" href="index.html">&larr; Back</a>
    <span id="game-title">BRAID TEST</span>
    <span style="font-size:10px;color:#5a4a3a">v0.8</span>
  </div>
  <div id="debug">
    <span class="label">twists:</span> <span class="val" id="d-twists">0</span>
    &nbsp;
    <span class="label">z-order:</span> <span class="val" id="d-zorder">R0:0 R1:1</span>
    &nbsp;
    <span class="label">moves:</span> <span class="val" id="d-moves">0</span>
    &nbsp;
    <span class="label">last:</span> <span class="val" id="d-last">—</span>
  </div>
  <button class="reset-btn" id="restart">Reset</button>
</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const header = document.getElementById('header');
  const restartBtn = document.getElementById('restart');
  const dTwists = document.getElementById('d-twists');
  const dZOrder = document.getElementById('d-zorder');
  const dMoves = document.getElementById('d-moves');
  const dLast = document.getElementById('d-last');

  const ROPE_COLORS = ['#ef4444', '#3b82f6'];

  const state = {
    pegs: [],
    ropeAtPeg: [],
    ropes: [],
    twists: [[0,0],[0,0]],
    zOrder: [0, 1],
    zCounter: 1,
    drag: null,
    hoverPeg: -1,
    moves: 0,
    woodGrain: [],
    lastAction: '—'
  };

  // --- Geometry ---
  function segmentsIntersect(ax,ay,bx,by,cx,cy,dx,dy) {
    const d1x=bx-ax, d1y=by-ay, d2x=dx-cx, d2y=dy-cy;
    const denom = d1x*d2y - d1y*d2x;
    if (Math.abs(denom) < 1e-10) return null;
    const t = ((cx-ax)*d2y-(cy-ay)*d2x)/denom;
    const u = ((cx-ax)*d1y-(cy-ay)*d1x)/denom;
    if (t>0.001 && t<0.999 && u>0.001 && u<0.999)
      return { x:ax+t*d1x, y:ay+t*d1y, t, u };
    return null;
  }
  function crossSign(ax,ay,bx,by,cx,cy,dx,dy) {
    return (bx-ax)*(dy-cy)-(by-ay)*(dx-cx) > 0 ? 1 : -1;
  }
  function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }

  // --- Wood grain ---
  function generateWoodGrain() {
    const w=canvas.width/devicePixelRatio, h=canvas.height/devicePixelRatio;
    state.woodGrain = [];
    let y=0;
    while (y<h) { const pts=[];
      for (let x=0;x<=w;x+=40) pts.push({x,dy:(Math.random()-0.5)*3});
      state.woodGrain.push({y,pts}); y+=10+Math.random()*10;
    }
  }

  // --- Hardcoded braiding scenario ---
  //
  //  Rope A (red):  horizontal, peg 0 → peg 1
  //  Rope B (blue): vertical,   peg 2 → peg 3
  //  They cross in the center.
  //
  //  Layout (3x3 grid of pegs):
  //
  //    4       2       5
  //
  //    0      [X]      1      ← rope A horizontal
  //
  //    6       3       7
  //
  //  Pegs 4,5,6,7 are empty.
  //  Peg 2 = top, peg 3 = bottom (rope B vertical)

  function setupBraidingScenario() {
    const w=canvas.width/devicePixelRatio, h=canvas.height/devicePixelRatio;
    const cx=w/2, cy=h/2, sp=150;

    state.pegs = [
      {x: cx-sp, y: cy},     // 0: rope A left
      {x: cx+sp, y: cy},     // 1: rope A right
      {x: cx,    y: cy-sp},  // 2: rope B top
      {x: cx,    y: cy+sp},  // 3: rope B bottom
      {x: cx-sp, y: cy-sp},  // 4: empty top-left
      {x: cx+sp, y: cy-sp},  // 5: empty top-right
      {x: cx-sp, y: cy+sp},  // 6: empty bottom-left
      {x: cx+sp, y: cy+sp},  // 7: empty bottom-right
    ];

    state.ropes = [
      { color: ROPE_COLORS[0], pegs: [0, 1] },  // A: red, horizontal
      { color: ROPE_COLORS[1], pegs: [2, 3] },  // B: blue, vertical
    ];

    state.ropeAtPeg = new Array(8).fill(null);
    state.ropeAtPeg[0] = {rope:0, end:0};
    state.ropeAtPeg[1] = {rope:0, end:1};
    state.ropeAtPeg[2] = {rope:1, end:0};
    state.ropeAtPeg[3] = {rope:1, end:1};

    state.twists = [[0,0],[0,0]];
    state.zOrder = [0, 1];
    state.zCounter = 1;
    state.drag = null;
    state.hoverPeg = -1;
    state.moves = 0;
    state.lastAction = '—';

    generateWoodGrain();
  }

  function executeMove(fromPeg, toPeg) {
    const re = state.ropeAtPeg[fromPeg];
    if (!re) return;
    const ropeIdx=re.rope, endIdx=re.end;
    const p1=state.pegs[fromPeg], p2=state.pegs[toPeg];
    const ropeName = ropeIdx===0 ? 'A(red)' : 'B(blue)';
    const endName = endIdx===0 ? 'end0' : 'end1';

    // Picking up puts this rope on top BEFORE crossing detection
    state.zCounter++;
    state.zOrder[ropeIdx] = state.zCounter;

    let crossed = false;
    for (let j=0;j<state.ropes.length;j++) {
      if (j===ropeIdx) continue;
      const other=state.ropes[j];
      const c=state.pegs[other.pegs[0]], d=state.pegs[other.pegs[1]];
      const hit = segmentsIntersect(p1.x,p1.y,p2.x,p2.y,c.x,c.y,d.x,d.y);
      if (hit) {
        let sign = crossSign(p1.x,p1.y,p2.x,p2.y,c.x,c.y,d.x,d.y);
        if (ropeIdx > j) sign = -sign;
        state.twists[ropeIdx][j] += sign;
        state.twists[j][ropeIdx] += sign;
        crossed = true;
        const otherName = j===0 ? 'A(red)' : 'B(blue)';
        state.lastAction = `${ropeName} ${endName}: peg${fromPeg}→peg${toPeg}, crossed ${otherName} (sign=${sign>0?'+':''}${sign}), twist=${state.twists[0][1]}`;
      }
    }
    if (!crossed) {
      state.lastAction = `${ropeName} ${endName}: peg${fromPeg}→peg${toPeg}, no crossing`;
    }

    state.ropes[ropeIdx].pegs[endIdx] = toPeg;
    state.ropeAtPeg[toPeg] = re;
    state.ropeAtPeg[fromPeg] = null;
  }

  function totalTwists() {
    return Math.abs(state.twists[0][1]);
  }

  // --- Rendering ---
  function drawBoard() {
    const w=canvas.width/devicePixelRatio, h=canvas.height/devicePixelRatio;
    const grad=ctx.createLinearGradient(0,0,w,h);
    grad.addColorStop(0,'#3d2a1a'); grad.addColorStop(0.3,'#4a3222');
    grad.addColorStop(0.5,'#3d2a1a'); grad.addColorStop(0.7,'#4a3222'); grad.addColorStop(1,'#3d2a1a');
    ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
    for (const line of state.woodGrain) {
      ctx.beginPath(); ctx.moveTo(0,line.y);
      for (const pt of line.pts) ctx.lineTo(pt.x,line.y+pt.dy);
      ctx.stroke();
    }
  }

  function getRopeEndpoints(ri) {
    const r=state.ropes[ri];
    if (state.drag && state.drag.rope===ri) {
      const otherEnd = state.drag.end===0?1:0;
      const a = state.pegs[r.pegs[otherEnd]];
      const b = state.drag.mouse;
      return state.drag.end===0 ? [b,a] : [a,b];
    }
    return [state.pegs[r.pegs[0]], state.pegs[r.pegs[1]]];
  }

  // --- Rope path computation ---
  // When twisted, ropes route through a shared "twist point" so they
  // visually cross each other, even when their endpoints are far apart.

  function computeTwistPoint() {
    // The twist point is where the two ropes physically intertwine.
    // It's the midpoint between both ropes' midpoints.
    const [a0, a1] = getRopeEndpoints(0);
    const [b0, b1] = getRopeEndpoints(1);
    return {
      x: (a0.x + a1.x + b0.x + b1.x) / 4,
      y: (a0.y + a1.y + b0.y + b1.y) / 4
    };
  }

  function computeRopePath(ropeIdx) {
    // Returns an array of points the rope passes through.
    // Untwisted: straight from end to end (with slight sag).
    // Twisted: routes through the twist point.
    const [endA, endB] = getRopeEndpoints(ropeIdx);
    const otherIdx = 1 - ropeIdx;
    const tw = Math.abs(state.twists[ropeIdx][otherIdx]);

    if (tw === 0) {
      // Simple curve — slight perpendicular sag
      const mx = (endA.x + endB.x) / 2;
      const my = (endA.y + endB.y) / 2;
      const dx = endB.x - endA.x, dy = endB.y - endA.y;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      return { points: [endA, endB], control: { x: mx - dy/len*8, y: my + dx/len*8 }, twisted: false };
    }

    // Twisted: route through the twist point
    const tp = computeTwistPoint();
    return { points: [endA, tp, endB], twisted: true, twistPoint: tp };
  }

  function drawRopeStroke(points, color, lineW, alpha, offsetX, offsetY) {
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    if (points.length === 2) {
      // Simple line
      const mx = (points[0].x + points[1].x) / 2 + offsetX;
      const my = (points[0].y + points[1].y) / 2 + offsetY;
      const dx = points[1].x - points[0].x, dy = points[1].y - points[0].y;
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      const cx = mx - dy/len*8, cy = my + dx/len*8;
      ctx.moveTo(points[0].x + offsetX, points[0].y + offsetY);
      ctx.quadraticCurveTo(cx, cy, points[1].x + offsetX, points[1].y + offsetY);
    } else {
      // Multi-point: use quadratic through the middle point
      ctx.moveTo(points[0].x + offsetX, points[0].y + offsetY);
      for (let i = 1; i < points.length - 1; i++) {
        const mid = points[i];
        // Use the midpoint as the actual curve point, with control points
        // that make a smooth path
        const prev = points[i-1];
        const next = points[i+1];
        const cp1x = (prev.x + mid.x*2) / 3 + offsetX;
        const cp1y = (prev.y + mid.y*2) / 3 + offsetY;
        ctx.quadraticCurveTo(mid.x + offsetX, mid.y + offsetY,
          (mid.x + next.x) / 2 + offsetX, (mid.y + next.y) / 2 + offsetY);
      }
      const last = points[points.length - 1];
      const prev = points[points.length - 2];
      ctx.quadraticCurveTo(prev.x + offsetX, prev.y + offsetY,
        last.x + offsetX, last.y + offsetY);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function drawRopeFull(points, color, lineW, alpha) {
    // Shadow
    drawRopeStroke(points, 'rgba(0,0,0,0.3)', lineW + 4, alpha, 2, 3);
    // Body
    drawRopeStroke(points, color, lineW, alpha, 0, 0);
    // Highlight
    drawRopeStroke(points, 'rgba(255,255,255,0.2)', Math.max(2, lineW*0.3), alpha, 0, 0);
  }

  function drawRopeEndpoint(x, y, color, isDragged) {
    const r = 12;
    ctx.beginPath(); ctx.arc(x+1, y+2, r, 0, 2*Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, r, 0, 2*Math.PI);
    const g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
    g.addColorStop(0, isDragged ? '#fff' : lightenColor(color, 40));
    g.addColorStop(1, color);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(x-r*0.25, y-r*0.3, r*0.3, 0, 2*Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
  }

  function lightenColor(hex, amt) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    r = Math.min(255, r+amt); g = Math.min(255, g+amt); b = Math.min(255, b+amt);
    return `rgb(${r},${g},${b})`;
  }

  function drawRopes() {
    const tw = state.twists[0][1];
    const absTw = Math.abs(tw);
    const lineW = 12;
    const overIdx = state.zOrder[0] > state.zOrder[1] ? 0 : 1;
    const underIdx = 1 - overIdx;

    const path0 = computeRopePath(0);
    const path1 = computeRopePath(1);

    if (absTw === 0) {
      // No twist — just draw both ropes normally
      drawRopeFull(path0.points, state.ropes[0].color, lineW, 1);
      drawRopeFull(path1.points, state.ropes[1].color, lineW, 1);
    } else {
      // Twisted — both ropes route through the twist point.
      // Draw under rope first, then over rope.
      // At the twist point, the over rope visually crosses on top.
      const underPath = underIdx === 0 ? path0 : path1;
      const overPath = overIdx === 0 ? path0 : path1;
      const tp = computeTwistPoint();

      // Draw under rope fully
      drawRopeFull(underPath.points, state.ropes[underIdx].color, lineW, 0.85);

      // Clear a gap at the twist point for the under rope
      ctx.save();
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, lineW + 4, 0, 2*Math.PI);
      ctx.clip();
      drawBoard(); // erase the under rope at the crossing
      ctx.restore();

      // Redraw under rope dimmed at the crossing (shows it going "behind")
      ctx.save();
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, lineW + 4, 0, 2*Math.PI);
      ctx.clip();
      drawRopeFull(underPath.points, state.ropes[underIdx].color, lineW, 0.3);
      ctx.restore();

      // Draw over rope fully on top
      drawRopeFull(overPath.points, state.ropes[overIdx].color, lineW, 1);
    }

    // Draw endpoints on top of everything
    for (let i = 0; i < 2; i++) {
      const [a, b] = getRopeEndpoints(i);
      const isDragEnd = state.drag && state.drag.rope === i;
      drawRopeEndpoint(a.x, a.y, state.ropes[i].color, isDragEnd && state.drag.end === 0);
      drawRopeEndpoint(b.x, b.y, state.ropes[i].color, isDragEnd && state.drag.end === 1);
    }

    // Draw twist count at the twist point
    if (absTw > 0) {
      const tp = computeTwistPoint();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`×${absTw}`, tp.x, tp.y - lineW - 8);
    }
  }

  function drawPeg(index) {
    if (state.ropeAtPeg[index] !== null) return;
    const peg=state.pegs[index], x=peg.x, y=peg.y, r=12;
    const isHover = state.hoverPeg===index;
    const isValidDrop = state.drag !== null;

    ctx.beginPath(); ctx.arc(x,y+2,r,0,2*Math.PI);
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r,0,2*Math.PI);
    const g=ctx.createRadialGradient(x,y,r*0.3,x,y,r);
    g.addColorStop(0,'#1a0e08'); g.addColorStop(1,'#2a1a10');
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(80,50,30,0.6)'; ctx.lineWidth=2; ctx.stroke();

    // Peg label
    ctx.fillStyle='rgba(200,160,120,0.5)'; ctx.font='11px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(index, x, y);

    if (isValidDrop && isHover) {
      ctx.beginPath(); ctx.arc(x,y,r+6,0,2*Math.PI);
      ctx.strokeStyle='rgba(245,197,99,0.7)'; ctx.lineWidth=3;
      ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
    } else if (isValidDrop) {
      ctx.beginPath(); ctx.arc(x,y,r+4,0,2*Math.PI);
      ctx.strokeStyle='rgba(245,197,99,0.2)'; ctx.lineWidth=1.5;
      ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    }
  }

  function drawPegLabels() {
    // Label occupied pegs too
    ctx.fillStyle='rgba(200,160,120,0.4)'; ctx.font='10px monospace';
    ctx.textAlign='center'; ctx.textBaseline='top';
    for (let i=0;i<state.pegs.length;i++) {
      const p=state.pegs[i];
      ctx.fillText(`p${i}`, p.x, p.y+16);
    }
  }

  function draw() {
    const dpr=devicePixelRatio;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const w=canvas.width/dpr, h=canvas.height/dpr;
    ctx.clearRect(0,0,w,h);
    drawBoard();
    drawRopes();
    for (let i=0;i<state.pegs.length;i++) drawPeg(i);
    drawPegLabels();
    updateDebug();
  }

  function updateDebug() {
    dTwists.textContent = state.twists[0][1];
    dZOrder.textContent = `A:${state.zOrder[0]} B:${state.zOrder[1]}`;
    dMoves.textContent = state.moves;
    dLast.textContent = state.lastAction;
  }

  // --- Interaction ---
  function getCanvasPos(e) {
    const rect=canvas.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:cx-rect.left, y:cy-rect.top};
  }

  function hitTestPeg(mx,my) {
    for (let i=0;i<state.pegs.length;i++) {
      if (dist(mx,my,state.pegs[i].x,state.pegs[i].y)<=28) return i;
    }
    return -1;
  }

  function hitTestRopeEnd(mx,my) {
    for (let i=0;i<state.ropes.length;i++) {
      const r=state.ropes[i];
      for (let e=0;e<2;e++) {
        const p=state.pegs[r.pegs[e]];
        if (dist(mx,my,p.x,p.y)<=22) return {rope:i,end:e,peg:r.pegs[e]};
      }
    }
    return null;
  }

  function deepCopyTwists() { return state.twists.map(r=>[...r]); }

  function onPointerDown(e) {
    e.preventDefault();
    const pos=getCanvasPos(e);
    const hit = hitTestRopeEnd(pos.x,pos.y);
    if (!hit) return;

    state.drag = {
      rope: hit.rope, end: hit.end, fromPeg: hit.peg,
      mouse: {x:pos.x, y:pos.y},
      savedTwists: deepCopyTwists(),
      savedRopePegs: state.ropes.map(r=>[...r.pegs]),
      savedRopeAtPeg: [...state.ropeAtPeg],
      savedZOrder: [...state.zOrder],
      savedZCounter: state.zCounter
    };
    state.ropeAtPeg[hit.peg] = null;
    canvas.classList.add('dragging');
    draw();
  }

  function onPointerMove(e) {
    const pos=getCanvasPos(e);
    if (state.drag) {
      e.preventDefault();
      state.drag.mouse = pos;
      state.hoverPeg = hitTestPeg(pos.x,pos.y);
      draw();
      return;
    }
    const hit=hitTestRopeEnd(pos.x,pos.y);
    const pegIdx=hitTestPeg(pos.x,pos.y);
    state.hoverPeg=pegIdx;
    canvas.classList.toggle('can-grab',!!hit);
    draw();
  }

  function onPointerUp(e) {
    if (!state.drag) return;
    const pos=getCanvasPos(e);
    const pegIdx=hitTestPeg(pos.x,pos.y);
    const isEmpty = pegIdx>=0 && state.ropeAtPeg[pegIdx]===null && pegIdx!==state.drag.fromPeg;

    if (isEmpty) {
      // Restore then execute (executeMove expects pre-move state)
      state.twists=state.drag.savedTwists;
      for (let i=0;i<state.ropes.length;i++) state.ropes[i].pegs=state.drag.savedRopePegs[i];
      state.ropeAtPeg=state.drag.savedRopeAtPeg;
      state.zOrder=state.drag.savedZOrder;
      state.zCounter=state.drag.savedZCounter;
      executeMove(state.drag.fromPeg, pegIdx);
      state.moves++;
    } else {
      // Cancel
      state.twists=state.drag.savedTwists;
      for (let i=0;i<state.ropes.length;i++) state.ropes[i].pegs=state.drag.savedRopePegs[i];
      state.ropeAtPeg=state.drag.savedRopeAtPeg;
      state.zOrder=state.drag.savedZOrder;
      state.zCounter=state.drag.savedZCounter;
      state.lastAction = 'cancelled';
    }

    state.drag=null;
    canvas.classList.remove('dragging','can-grab');
    draw();
  }

  canvas.addEventListener('mousedown',onPointerDown);
  canvas.addEventListener('mousemove',onPointerMove);
  canvas.addEventListener('mouseup',onPointerUp);
  canvas.addEventListener('mouseleave',(e)=>{if(state.drag)onPointerUp(e);state.hoverPeg=-1;canvas.classList.remove('can-grab');});
  canvas.addEventListener('touchstart',onPointerDown,{passive:false});
  canvas.addEventListener('touchmove',onPointerMove,{passive:false});
  canvas.addEventListener('touchend',onPointerUp);
  canvas.addEventListener('touchcancel',(e)=>{if(state.drag)onPointerUp(e);});

  restartBtn.addEventListener('click', () => { setupBraidingScenario(); draw(); });

  function resizeCanvas() {
    const dpr=devicePixelRatio||1, w=window.innerWidth, h=window.innerHeight-header.offsetHeight;
    canvas.style.width=w+'px'; canvas.style.height=h+'px';
    canvas.width=w*dpr; canvas.height=h*dpr;
  }
  window.addEventListener('resize',()=>{resizeCanvas();setupBraidingScenario();draw();});

  resizeCanvas();
  setupBraidingScenario();
  draw();
  window.__gameState=state;
  window.__draw=draw;
})();
</script>
</body>
</html>
