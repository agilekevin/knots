<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tangle Ropes — 3D Braiding Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #2c1810; color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; }
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: linear-gradient(180deg, #3d2415 0%, #2c1810 100%);
  height: 56px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
#header-left { display: flex; align-items: center; gap: 16px; }
#game-title { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #f5c563; }
#home-link { color: #8a7060; text-decoration: none; font-size: 13px; }
#debug { font-size: 13px; color: #8a7060; font-family: monospace; }
#debug .val { color: #f5c563; font-weight: 600; }
#debug .label { color: #6a5a4a; }
button.reset-btn {
  background: rgba(255,255,255,0.06); color: #8a7060;
  border: 1px solid rgba(255,255,255,0.1); padding: 6px 16px;
  border-radius: 6px; cursor: pointer; font-size: 13px;
}
button.reset-btn:hover { background: rgba(255,255,255,0.1); color: #c8a882; }
#container { width: 100%; cursor: default; touch-action: none; }
#container.can-grab { cursor: grab; }
#container.dragging { cursor: grabbing; }
</style>
</head>
<body>
<div id="header">
  <div id="header-left">
    <a id="home-link" href="index.html">&larr; Back</a>
    <span id="game-title">BRAID TEST 3D</span>
    <span style="font-size:10px;color:#5a4a3a">v2.0</span>
  </div>
  <div id="debug">
    <span class="label">moves:</span> <span class="val" id="d-moves">0</span>
    &nbsp;
    <span class="label">drag:</span> <span class="val" id="d-drag">—</span>
  </div>
  <button class="reset-btn" id="restart">Reset</button>
</div>
<div id="container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

const container = document.getElementById('container');
const restartBtn = document.getElementById('restart');
const dMoves = document.getElementById('d-moves');
const dDrag = document.getElementById('d-drag');
const headerH = document.getElementById('header').offsetHeight;

// --- Config ---
const ROPE_RADIUS = 0.12;
const ROPE_SEGMENTS = 12;      // physics bodies per rope
const ROPE_TUBE_SEGS = 64;     // rendering smoothness
const PEG_RADIUS = 0.2;
const SPACING = 3;             // distance between pegs
const COLORS = [0xef4444, 0x3b82f6];
const BG_COLOR = 0x3d2a1a;

// --- Three.js setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(BG_COLOR);

const aspect = window.innerWidth / (window.innerHeight - headerH);
const d = 5;
const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 100);
camera.position.set(0, 0, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight - headerH);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(2, 4, 10);
scene.add(dirLight);

// --- Cannon-es physics ---
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -0.5, 0) });
world.solver.iterations = 50;

// Board (ground plane at y = -d to keep ropes from falling forever)
const groundBody = new CANNON.Body({
  type: CANNON.Body.STATIC,
  shape: new CANNON.Plane()
});
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
groundBody.position.set(0, -4, 0);
world.addBody(groundBody);

// --- State ---
const state = {
  ropes: [],        // [{bodies:[], meshes:[], tubeMesh, color, endA_peg, endB_peg}]
  pegs: [],         // [{position: Vec3, mesh, occupied: bool}]
  drag: null,       // {ropeIdx, endIdx, bodyIdx}
  moves: 0
};

// --- Peg creation ---
function createPeg(x, y, occupied) {
  const geo = new THREE.CylinderGeometry(PEG_RADIUS, PEG_RADIUS, 0.3, 16);
  const mat = new THREE.MeshStandardMaterial({
    color: occupied ? 0x888888 : 0x1a0e08,
    roughness: 0.8
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, -0.5);
  mesh.rotation.x = Math.PI / 2;
  scene.add(mesh);
  return { position: new THREE.Vector3(x, y, 0), mesh, occupied };
}

// --- Rope creation ---
// Each rope is a chain of Cannon-es spheres connected by DistanceConstraints.
// Collision groups: ropes collide with OTHER ropes but not themselves.
const GROUP_ROPE_A = 1;
const GROUP_ROPE_B = 2;
const GROUP_GROUND = 4;

function createRope(startX, startY, endX, endY, colorHex, collisionGroup, collisionMask, zLayer) {
  const bodies = [];
  const segLen = Math.sqrt((endX-startX)**2 + (endY-startY)**2) / (ROPE_SEGMENTS - 1);

  for (let i = 0; i < ROPE_SEGMENTS; i++) {
    const t = i / (ROPE_SEGMENTS - 1);
    const x = startX + (endX - startX) * t;
    const y = startY + (endY - startY) * t;
    const z = zLayer || 0;

    const body = new CANNON.Body({
      mass: (i === 0 || i === ROPE_SEGMENTS - 1) ? 0 : 2,
      shape: new CANNON.Sphere(ROPE_RADIUS * 3),
      position: new CANNON.Vec3(x, y, z),
      linearDamping: 0.95,
      angularDamping: 0.99,
      collisionFilterGroup: collisionGroup,
      collisionFilterMask: collisionMask | GROUP_GROUND
    });
    world.addBody(body);
    bodies.push(body);

    if (i > 0) {
      const constraint = new CANNON.DistanceConstraint(bodies[i-1], body, segLen);
      constraint.collideConnected = false;
      world.addConstraint(constraint);
    }
  }

  // Create tube mesh
  const mat = new THREE.MeshStandardMaterial({
    color: colorHex,
    roughness: 0.6,
    metalness: 0.1
  });
  const tubeMesh = new THREE.Mesh(new THREE.BufferGeometry(), mat);
  scene.add(tubeMesh);

  // Endpoint spheres (visual handles)
  const endGeo = new THREE.SphereGeometry(ROPE_RADIUS * 2.5, 16, 16);
  const endMatA = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4 });
  const endMatB = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4 });
  const endMeshA = new THREE.Mesh(endGeo, endMatA);
  const endMeshB = new THREE.Mesh(endGeo, endMatB);
  scene.add(endMeshA);
  scene.add(endMeshB);

  return {
    bodies, tubeMesh, color: colorHex,
    endMeshA, endMeshB,
    mat
  };
}

function updateRopeMesh(rope) {
  const pts = rope.bodies.map(b =>
    new THREE.Vector3(b.position.x, b.position.y, b.position.z)
  );
  const curve = new THREE.CatmullRomCurve3(pts);
  rope.tubeMesh.geometry.dispose();
  rope.tubeMesh.geometry = new THREE.TubeGeometry(curve, ROPE_TUBE_SEGS, ROPE_RADIUS, 8, false);

  // Update endpoint visuals
  const first = rope.bodies[0].position;
  const last = rope.bodies[rope.bodies.length - 1].position;
  rope.endMeshA.position.set(first.x, first.y, first.z);
  rope.endMeshB.position.set(last.x, last.y, last.z);
}

// --- Setup scenario ---
function setup() {
  // Clear old state
  while (scene.children.length > 0) scene.remove(scene.children[0]);
  // Re-add lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(2, 4, 10);
  scene.add(dl);

  // Remove old physics bodies
  while (world.bodies.length > 0) world.removeBody(world.bodies[0]);
  while (world.constraints.length > 0) world.removeConstraint(world.constraints[0]);

  // Re-add ground
  world.addBody(groundBody);

  // Pegs: 3x3 grid centered at origin
  //  4  2  5
  //  0  .  1
  //  6  3  7
  state.pegs = [];
  const pegPositions = [
    [-SPACING, 0],          // 0: rope A left
    [SPACING, 0],           // 1: rope A right
    [0, SPACING],           // 2: rope B top
    [0, -SPACING],          // 3: rope B bottom
    [-SPACING, SPACING],    // 4: empty TL
    [SPACING, SPACING],     // 5: empty TR
    [-SPACING, -SPACING],   // 6: empty BL
    [SPACING, -SPACING],    // 7: empty BR
  ];
  const occupied = [true, true, true, true, false, false, false, false];
  for (let i = 0; i < pegPositions.length; i++) {
    state.pegs.push(createPeg(pegPositions[i][0], pegPositions[i][1], occupied[i]));
  }

  // Rope A (red): horizontal, peg 0 → peg 1
  // Rope B (blue): vertical, peg 2 → peg 3
  // Collision: A collides with B but not itself, and vice versa
  state.ropes = [];
  state.ropes.push(createRope(
    -SPACING, 0, SPACING, 0,
    COLORS[0], GROUP_ROPE_A, GROUP_ROPE_B, -0.08
  ));
  state.ropes.push(createRope(
    0, SPACING, 0, -SPACING,
    COLORS[1], GROUP_ROPE_B, GROUP_ROPE_A, 0.08
  ));

  state.drag = null;
  state.moves = 0;
}

// --- Interaction ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getWorldPos(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  // Intersect with z=0 plane
  const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, target);
  return target;
}

function hitTestEndpoint(worldPos) {
  const threshold = 0.6;
  for (let ri = 0; ri < state.ropes.length; ri++) {
    const rope = state.ropes[ri];
    const first = rope.bodies[0].position;
    const last = rope.bodies[rope.bodies.length-1].position;
    if (worldPos.distanceTo(new THREE.Vector3(first.x, first.y, first.z)) < threshold) {
      return { ropeIdx: ri, endIdx: 0, bodyIdx: 0 };
    }
    if (worldPos.distanceTo(new THREE.Vector3(last.x, last.y, last.z)) < threshold) {
      return { ropeIdx: ri, endIdx: 1, bodyIdx: rope.bodies.length - 1 };
    }
  }
  return null;
}

function hitTestPeg(worldPos) {
  const threshold = 0.5;
  for (let i = 0; i < state.pegs.length; i++) {
    if (state.pegs[i].position.distanceTo(worldPos) < threshold) return i;
  }
  return -1;
}

function onPointerDown(e) {
  e.preventDefault();
  const wp = getWorldPos(e);
  if (!wp) return;
  const hit = hitTestEndpoint(wp);
  if (!hit) return;

  const body = state.ropes[hit.ropeIdx].bodies[hit.bodyIdx];
  body.mass = 0; // make it kinematic so we can move it
  body.updateMassProperties();

  state.drag = { ...hit, origPos: body.position.clone() };
  container.classList.add('dragging');
  dDrag.textContent = `R${hit.ropeIdx} end${hit.endIdx}`;
}

function onPointerMove(e) {
  const wp = getWorldPos(e);
  if (!wp) return;

  if (state.drag) {
    e.preventDefault();
    const body = state.ropes[state.drag.ropeIdx].bodies[state.drag.bodyIdx];
    body.position.set(wp.x, wp.y, body.position.z);
    body.velocity.set(0, 0, 0);
    return;
  }

  // Hover
  const hit = hitTestEndpoint(wp);
  container.classList.toggle('can-grab', !!hit);
}

function onPointerUp(e) {
  if (!state.drag) return;

  const wp = getWorldPos(e);
  const pegIdx = wp ? hitTestPeg(wp) : -1;
  const body = state.ropes[state.drag.ropeIdx].bodies[state.drag.bodyIdx];

  if (pegIdx >= 0 && !state.pegs[pegIdx].occupied) {
    // Snap to peg
    const peg = state.pegs[pegIdx];
    body.position.set(peg.position.x, peg.position.y, 0);
    body.velocity.set(0, 0, 0);
    peg.occupied = true;
    // Free old peg (find which one this endpoint was on)
    // For simplicity, mark the nearest peg to origPos as free
    let minDist = Infinity, oldPeg = -1;
    for (let i = 0; i < state.pegs.length; i++) {
      const d = state.pegs[i].position.distanceTo(
        new THREE.Vector3(state.drag.origPos.x, state.drag.origPos.y, 0));
      if (d < minDist) { minDist = d; oldPeg = i; }
    }
    if (oldPeg >= 0) state.pegs[oldPeg].occupied = false;
    state.moves++;
    dMoves.textContent = state.moves;
    dDrag.textContent = `moved to p${pegIdx}`;
  } else {
    // Cancel — snap back
    body.position.copy(state.drag.origPos);
    body.velocity.set(0, 0, 0);
    dDrag.textContent = 'cancelled';
  }

  // Keep endpoint pinned (mass 0)
  body.mass = 0;
  body.updateMassProperties();

  state.drag = null;
  container.classList.remove('dragging', 'can-grab');
}

renderer.domElement.addEventListener('mousedown', onPointerDown);
renderer.domElement.addEventListener('mousemove', onPointerMove);
renderer.domElement.addEventListener('mouseup', onPointerUp);
renderer.domElement.addEventListener('mouseleave', (e) => { if (state.drag) onPointerUp(e); });
renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: false });
renderer.domElement.addEventListener('touchmove', onPointerMove, { passive: false });
renderer.domElement.addEventListener('touchend', onPointerUp);

restartBtn.addEventListener('click', () => { setup(); });

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight - headerH;
  const a = w / h;
  camera.left = -d * a; camera.right = d * a;
  camera.top = d; camera.bottom = -d;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// --- Animation loop ---
function animate() {
  world.step(1/60);

  for (const rope of state.ropes) {
    updateRopeMesh(rope);
  }

  // Update peg visuals
  for (const peg of state.pegs) {
    peg.mesh.material.color.setHex(peg.occupied ? 0x888888 : 0x1a0e08);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

setup();
animate();
</script>
</body>
</html>
