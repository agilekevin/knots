<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tangle Ropes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #2c1810;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: linear-gradient(180deg, #3d2415 0%, #2c1810 100%);
  height: 56px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
#header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
#game-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #f5c563;
}
#home-link {
  color: #8a7060;
  text-decoration: none;
  font-size: 13px;
  transition: color 0.15s;
}
#home-link:hover { color: #c8a882; }
#level-label {
  font-size: 13px;
  color: #8a7060;
  font-weight: 500;
}
#header-center {
  display: flex;
  align-items: center;
  gap: 6px;
}
#crossings-icon {
  display: inline-block;
  width: 16px; height: 16px;
  position: relative;
}
#crossings-icon::before, #crossings-icon::after {
  content: '';
  position: absolute;
  border-radius: 1px;
  width: 16px; height: 2px;
  top: 7px; left: 0;
  transition: background 0.3s;
  background: #ef4444;
}
#crossings-icon::before { transform: rotate(45deg); }
#crossings-icon::after { transform: rotate(-45deg); }
#crossings-icon.solved::before, #crossings-icon.solved::after { background: #34d399; }
#tangles {
  font-size: 22px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #ef4444;
  transition: color 0.3s;
  min-width: 24px;
  text-align: center;
}
#tangles.solved { color: #34d399; }
#header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
#moves-label { font-size: 12px; color: #8a7060; }
#moves {
  font-size: 14px;
  font-weight: 600;
  color: #f5c563;
  font-variant-numeric: tabular-nums;
}
.band-btn {
  background: rgba(255,255,255,0.04);
  color: #8a7060;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}
.band-btn:hover { background: rgba(255,255,255,0.08); color: #c8a882; }
.band-btn.active {
  background: rgba(245, 197, 99, 0.15);
  color: #f5c563;
  border-color: rgba(245, 197, 99, 0.3);
}
.action-btn {
  background: rgba(255,255,255,0.04);
  color: #8a7060;
  border: 1px solid rgba(255,255,255,0.08);
  width: 34px; height: 34px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-size: 16px;
  line-height: 1;
}
.action-btn:hover { background: rgba(255,255,255,0.08); color: #c8a882; }
canvas {
  display: block;
  cursor: default;
  touch-action: none;
}
canvas.can-grab { cursor: grab; }
canvas.dragging { cursor: grabbing; }
canvas.can-drop { cursor: pointer; }
#instructions {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(44, 24, 16, 0.92);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  color: #8a7060;
  transition: opacity 0.5s, transform 0.5s;
  pointer-events: none;
  z-index: 5;
  text-align: center;
  max-width: 400px;
}
#instructions.hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(10px);
}
#win-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}
#win-overlay.visible { display: flex; }
#win-card {
  background: linear-gradient(135deg, #3d2415 0%, #4a2d1a 100%);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 40px 48px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#win-card h2 { font-size: 36px; font-weight: 700; color: #f5c563; margin-bottom: 6px; }
#win-stats { font-size: 14px; color: #8a7060; margin-bottom: 24px; }
#win-stats span { color: #f5c563; font-weight: 600; }
#next-level {
  background: linear-gradient(135deg, #f5c563, #e8a33a);
  color: #2c1810;
  border: none;
  padding: 12px 36px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(245, 197, 99, 0.25);
}
#next-level:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(245, 197, 99, 0.35);
}
@media (max-width: 700px) {
  #header { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 6px; }
  #header-left { order: 1; }
  #header-center { order: 3; }
  #header-right { order: 2; flex-wrap: wrap; gap: 6px; }
  .band-btn { padding: 4px 8px; font-size: 11px; }
}
</style>
</head>
<body>
<div id="header">
  <div id="header-left">
    <a id="home-link" href="index.html">&larr; Back</a>
    <span id="game-title">TANGLE ROPES</span>
    <span id="level-label">Level 1</span>
  </div>
  <div id="header-center">
    <div id="crossings-icon"></div>
    <span id="tangles">0</span>
  </div>
  <div id="header-right">
    <span id="moves-label">Moves</span>
    <span id="moves">0</span>
    <div style="width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 4px"></div>
    <button class="band-btn active" data-band="easy">Easy</button>
    <button class="band-btn" data-band="medium">Medium</button>
    <button class="band-btn" data-band="hard">Hard</button>
    <button class="band-btn" data-band="expert">Expert</button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 4px"></div>
    <button class="action-btn" id="restart" title="Restart level">&#x21bb;</button>
  </div>
</div>
<canvas id="canvas"></canvas>
<div id="instructions">Pick up a rope end and move it to the empty peg.<br>Be careful — dragging across other ropes adds tangles!</div>
<div id="win-overlay">
  <div id="win-card">
    <h2>Untangled!</h2>
    <div id="win-stats">Solved in <span id="win-moves">0</span> moves</div>
    <button id="next-level">Next Level</button>
  </div>
</div>
<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const header = document.getElementById('header');
  const levelLabel = document.getElementById('level-label');
  const tanglesLabel = document.getElementById('tangles');
  const tanglesIcon = document.getElementById('crossings-icon');
  const movesLabel = document.getElementById('moves');
  const winMovesLabel = document.getElementById('win-moves');
  const restartBtn = document.getElementById('restart');
  const winOverlay = document.getElementById('win-overlay');
  const nextLevelBtn = document.getElementById('next-level');
  const instructionsEl = document.getElementById('instructions');
  const bandBtns = document.querySelectorAll('.band-btn');

  const BANDS = {
    easy:   { startLevel: 1 },
    medium: { startLevel: 5 },
    hard:   { startLevel: 10 },
    expert: { startLevel: 18 }
  };

  const ROPE_COLORS = [
    '#ef4444', '#3b82f6', '#22c55e', '#f97316',
    '#a855f7', '#ec4899', '#14b8a6', '#eab308',
    '#f43f5e', '#8b5cf6', '#06b6d4', '#84cc16'
  ];

  const state = {
    level: 1,
    pegs: [],           // {x, y} — fixed positions
    ropeAtPeg: [],      // ropeAtPeg[pegIdx] = {rope, end} | null
    emptyPeg: -1,
    ropes: [],          // {color, pegs: [pegIdx, pegIdx]}
    twists: [],         // twists[i][j] = signed int
    drag: null,         // {rope, end, fromPeg, prevMouse, savedTwists, savedRopes, savedRopeAtPeg, savedEmpty}
    mouse: null,
    hoverPeg: -1,
    solved: false,
    moves: 0,
    instructionsDismissed: false,
    woodGrain: [],
    winAnimId: null
  };

  // --- Geometry ---

  function segmentsIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
    const d1x = bx - ax, d1y = by - ay;
    const d2x = dx - cx, d2y = dy - cy;
    const denom = d1x * d2y - d1y * d2x;
    if (Math.abs(denom) < 1e-10) return null;
    const t = ((cx - ax) * d2y - (cy - ay) * d2x) / denom;
    const u = ((cx - ax) * d1y - (cy - ay) * d1x) / denom;
    if (t > 0.001 && t < 0.999 && u > 0.001 && u < 0.999) {
      return {
        x: ax + t * d1x,
        y: ay + t * d1y,
        t, u
      };
    }
    return null;
  }

  function crossProductSign(ax, ay, bx, by, cx, cy, dx, dy) {
    // Sign of cross product of (B-A) and (D-C)
    const v = (bx - ax) * (dy - cy) - (by - ay) * (dx - cx);
    return v > 0 ? 1 : -1;
  }

  function dist(x1, y1, x2, y2) {
    return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
  }

  // --- Wood grain (stable) ---

  function generateWoodGrain() {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    state.woodGrain = [];
    let y = 0;
    while (y < h) {
      const pts = [];
      for (let x = 0; x <= w; x += 40) {
        pts.push({ x, dy: (Math.random() - 0.5) * 3 });
      }
      state.woodGrain.push({ y, pts });
      y += 10 + Math.random() * 10;
    }
  }

  // --- Level Generation ---

  function ropesForLevel(level) {
    return Math.min(2 + level, 12);
  }

  function shuffleMovesForLevel(level) {
    return 3 + level * 2;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generateLevel(numRopes, numShuffles) {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const cx = w / 2;
    const cy = h / 2;
    const numPegs = 2 * numRopes + 1;
    const R = Math.min(cx, cy) * 0.55;

    // Place pegs in circle
    state.pegs = [];
    for (let i = 0; i < numPegs; i++) {
      const angle = (2 * Math.PI * i) / numPegs - Math.PI / 2;
      state.pegs.push({
        x: cx + R * Math.cos(angle),
        y: cy + R * Math.sin(angle)
      });
    }

    // Create ropes connecting adjacent pairs (non-crossing)
    state.ropes = [];
    state.ropeAtPeg = new Array(numPegs).fill(null);
    for (let i = 0; i < numRopes; i++) {
      const pA = i * 2;
      const pB = i * 2 + 1;
      state.ropes.push({
        color: ROPE_COLORS[i % ROPE_COLORS.length],
        pegs: [pA, pB]
      });
      state.ropeAtPeg[pA] = { rope: i, end: 0 };
      state.ropeAtPeg[pB] = { rope: i, end: 1 };
    }
    state.emptyPeg = numPegs - 1;

    // Initialize twists to 0
    state.twists = [];
    for (let i = 0; i < numRopes; i++) {
      state.twists[i] = new Array(numRopes).fill(0);
    }

    // Shuffle by performing random moves
    for (let m = 0; m < numShuffles; m++) {
      const occupied = [];
      for (let p = 0; p < numPegs; p++) {
        if (state.ropeAtPeg[p] !== null) occupied.push(p);
      }
      const fromPeg = occupied[Math.floor(Math.random() * occupied.length)];
      executeMove(fromPeg, state.emptyPeg);
    }

    // Ensure there are actual tangles
    if (totalTwists() === 0) {
      // Force some tangles by doing more shuffles
      for (let m = 0; m < numShuffles * 2; m++) {
        const occupied = [];
        for (let p = 0; p < state.pegs.length; p++) {
          if (state.ropeAtPeg[p] !== null) occupied.push(p);
        }
        const fromPeg = occupied[Math.floor(Math.random() * occupied.length)];
        executeMove(fromPeg, state.emptyPeg);
        if (totalTwists() > 0) break;
      }
    }

    generateWoodGrain();
  }

  function executeMove(fromPeg, toPeg) {
    const re = state.ropeAtPeg[fromPeg];
    if (!re) return;
    const ropeIdx = re.rope;
    const endIdx = re.end;

    const p1 = state.pegs[fromPeg];
    const p2 = state.pegs[toPeg];

    // Check which other ropes this move crosses
    for (let j = 0; j < state.ropes.length; j++) {
      if (j === ropeIdx) continue;
      const other = state.ropes[j];
      const c = state.pegs[other.pegs[0]];
      const d = state.pegs[other.pegs[1]];
      const hit = segmentsIntersect(p1.x, p1.y, p2.x, p2.y, c.x, c.y, d.x, d.y);
      if (hit) {
        const sign = crossProductSign(p1.x, p1.y, p2.x, p2.y, c.x, c.y, d.x, d.y);
        state.twists[ropeIdx][j] += sign;
        state.twists[j][ropeIdx] += sign;
      }
    }

    // Update assignments
    state.ropes[ropeIdx].pegs[endIdx] = toPeg;
    state.ropeAtPeg[toPeg] = re;
    state.ropeAtPeg[fromPeg] = null;
    state.emptyPeg = fromPeg;
  }

  function totalTwists() {
    let total = 0;
    for (let i = 0; i < state.ropes.length; i++) {
      for (let j = i + 1; j < state.ropes.length; j++) {
        total += Math.abs(state.twists[i][j]);
      }
    }
    return total;
  }

  // --- Rendering ---

  function drawBoard() {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#3d2a1a');
    grad.addColorStop(0.3, '#4a3222');
    grad.addColorStop(0.5, '#3d2a1a');
    grad.addColorStop(0.7, '#4a3222');
    grad.addColorStop(1, '#3d2a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    for (const line of state.woodGrain) {
      ctx.beginPath();
      ctx.moveTo(0, line.y);
      for (const pt of line.pts) ctx.lineTo(pt.x, line.y + pt.dy);
      ctx.stroke();
    }
  }

  function getRopeEndpoints(ropeIdx) {
    const r = state.ropes[ropeIdx];
    // If this rope is being dragged, one end is at mouse
    if (state.drag && state.drag.rope === ropeIdx) {
      const otherEnd = state.drag.end === 0 ? 1 : 0;
      const otherPeg = r.pegs[otherEnd];
      const a = state.pegs[otherPeg];
      const b = state.mouse || state.pegs[r.pegs[state.drag.end]];
      return state.drag.end === 0 ? [b, a] : [a, b];
    }
    return [state.pegs[r.pegs[0]], state.pegs[r.pegs[1]]];
  }

  function drawRopeSegment(x1, y1, x2, y2, color, alpha) {
    ctx.globalAlpha = alpha || 1;
    // Shadow
    ctx.beginPath();
    ctx.moveTo(x1 + 2, y1 + 3);
    ctx.lineTo(x2 + 2, y2 + 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Body
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Highlight
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function computeAllCrossings() {
    // Returns list of {ropeA, ropeB, point, twistCount}
    const crossings = [];
    for (let i = 0; i < state.ropes.length; i++) {
      for (let j = i + 1; j < state.ropes.length; j++) {
        const tw = state.twists[i][j];
        if (tw === 0) continue;
        const [a1, a2] = getRopeEndpoints(i);
        const [b1, b2] = getRopeEndpoints(j);
        const hit = segmentsIntersect(a1.x, a1.y, a2.x, a2.y, b1.x, b1.y, b2.x, b2.y);
        if (hit) {
          crossings.push({ ropeA: i, ropeB: j, point: hit, twistCount: tw });
        } else {
          // Ropes don't geometrically cross but have twists — find midpoint between them
          const mx = (a1.x + a2.x + b1.x + b2.x) / 4;
          const my = (a1.y + a2.y + b1.y + b2.y) / 4;
          crossings.push({ ropeA: i, ropeB: j, point: {x: mx, y: my}, twistCount: tw, phantom: true });
        }
      }
    }
    return crossings;
  }

  function drawRopes() {
    const crossings = computeAllCrossings();

    // Build set of ropes involved in crossings and their over/under status
    const underAtPoint = []; // {ropeIdx, point, radius}

    for (const c of crossings) {
      // Rope with higher twist contribution is "under"
      const underRope = c.twistCount > 0 ? c.ropeB : c.ropeA;
      underAtPoint.push({ rope: underRope, point: c.point });
    }

    // Phase 1: Draw all ropes
    for (let i = 0; i < state.ropes.length; i++) {
      const [a, b] = getRopeEndpoints(i);
      const isDragged = state.drag && state.drag.rope === i;
      const tangled = state.twists[i].some(t => t !== 0);
      const alpha = (tangled && !isDragged) ? 0.7 : 1;
      drawRopeSegment(a.x, a.y, b.x, b.y, state.ropes[i].color, alpha);
    }

    // Phase 2: At crossing points, redraw over rope on top
    for (const c of crossings) {
      const overRope = c.twistCount > 0 ? c.ropeA : c.ropeB;
      const [a, b] = getRopeEndpoints(overRope);
      const p = c.point;
      const patchR = 16;

      // Draw board-colored circle to create gap
      ctx.save();
      ctx.beginPath();
      ctx.arc(p.x, p.y, patchR, 0, 2 * Math.PI);
      ctx.clip();
      drawBoard(); // redraw board in clip region
      // Redraw under rope in clip (with gap look)
      const underRope = c.twistCount > 0 ? c.ropeB : c.ropeA;
      const [ua, ub] = getRopeEndpoints(underRope);
      drawRopeSegment(ua.x, ua.y, ub.x, ub.y, state.ropes[underRope].color, 0.5);
      // Redraw over rope in clip (solid, on top)
      drawRopeSegment(a.x, a.y, b.x, b.y, state.ropes[overRope].color, 1);
      ctx.restore();

      // Draw twist count badge if > 1
      const absTw = Math.abs(c.twistCount);
      if (absTw > 1) {
        ctx.beginPath();
        ctx.arc(p.x + 10, p.y - 10, 9, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('x' + absTw, p.x + 10, p.y - 10);
      }
    }
  }

  function drawPeg(index) {
    const peg = state.pegs[index];
    const x = peg.x, y = peg.y;
    const isEmpty = state.ropeAtPeg[index] === null ||
      (state.drag && state.drag.fromPeg === index);
    const isHover = state.hoverPeg === index;
    const isDropTarget = state.drag && isEmpty;
    const r = 14;

    // Peg hole shadow
    ctx.beginPath();
    ctx.arc(x, y + 2, r, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();

    // Peg hole
    ctx.beginPath();
    ctx.arc(x, y, r, 0, 2 * Math.PI);
    const grad = ctx.createRadialGradient(x, y, r * 0.3, x, y, r);
    if (isEmpty) {
      grad.addColorStop(0, '#1a0e08');
      grad.addColorStop(1, '#2a1a10');
    } else {
      grad.addColorStop(0, '#d4d4dc');
      grad.addColorStop(1, '#8888a0');
    }
    ctx.fillStyle = grad;
    ctx.fill();

    // Peg rim
    ctx.strokeStyle = isEmpty ? 'rgba(80,50,30,0.6)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // If not empty, draw the rope color dot on top
    if (!isEmpty) {
      const re = state.ropeAtPeg[index];
      if (re) {
        ctx.beginPath();
        ctx.arc(x, y, r * 0.4, 0, 2 * Math.PI);
        ctx.fillStyle = state.ropes[re.rope].color;
        ctx.fill();
      }
      // Specular highlight
      ctx.beginPath();
      ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.3, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }

    // Highlight for drop target
    if (isDropTarget && isHover) {
      ctx.beginPath();
      ctx.arc(x, y, r + 6, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(245, 197, 99, 0.6)';
      ctx.lineWidth = 3;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Highlight for hover on occupied peg (can pick up)
    if (!state.drag && !isEmpty && isHover) {
      ctx.beginPath();
      ctx.arc(x, y, r + 5, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Empty peg pulse (subtle)
    if (isEmpty && !state.drag) {
      ctx.beginPath();
      ctx.arc(x, y, r + 4, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(245, 197, 99, 0.15)';
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function draw() {
    const dpr = devicePixelRatio;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;
    ctx.clearRect(0, 0, w, h);

    drawBoard();
    drawRopes();

    // Draw pegs on top
    for (let i = 0; i < state.pegs.length; i++) {
      drawPeg(i);
    }

    // Update header
    const tt = totalTwists();
    tanglesLabel.textContent = tt;
    tanglesLabel.className = tt === 0 ? 'solved' : '';
    tanglesIcon.className = tt === 0 ? 'solved' : '';
    movesLabel.textContent = state.moves;
  }

  // --- Interaction ---

  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function hitTestPeg(mx, my) {
    for (let i = 0; i < state.pegs.length; i++) {
      const p = state.pegs[i];
      if (dist(mx, my, p.x, p.y) <= 20) return i;
    }
    return -1;
  }

  function dismissInstructions() {
    if (!state.instructionsDismissed) {
      state.instructionsDismissed = true;
      instructionsEl.classList.add('hidden');
    }
  }

  function deepCopyTwists() {
    return state.twists.map(row => [...row]);
  }

  function onPointerDown(e) {
    if (state.solved) return;
    e.preventDefault();
    dismissInstructions();
    const pos = getCanvasPos(e);
    const pegIdx = hitTestPeg(pos.x, pos.y);
    if (pegIdx < 0) return;

    const re = state.ropeAtPeg[pegIdx];
    if (!re) return; // clicked empty peg

    // Pick up this rope end
    state.drag = {
      rope: re.rope,
      end: re.end,
      fromPeg: pegIdx,
      prevMouse: { x: state.pegs[pegIdx].x, y: state.pegs[pegIdx].y },
      savedTwists: deepCopyTwists(),
      savedRopePegs: state.ropes.map(r => [...r.pegs]),
      savedRopeAtPeg: [...state.ropeAtPeg],
      savedEmpty: state.emptyPeg
    };
    state.mouse = pos;
    // Temporarily free this peg
    state.ropeAtPeg[pegIdx] = null;
    canvas.classList.add('dragging');
    draw();
  }

  function onPointerMove(e) {
    const pos = getCanvasPos(e);
    state.mouse = pos;

    if (state.drag) {
      e.preventDefault();

      // Track twist changes: does mouse path cross any other rope?
      const prev = state.drag.prevMouse;
      for (let j = 0; j < state.ropes.length; j++) {
        if (j === state.drag.rope) continue;
        const r = state.ropes[j];
        const c = state.pegs[r.pegs[0]];
        const d = state.pegs[r.pegs[1]];
        const hit = segmentsIntersect(prev.x, prev.y, pos.x, pos.y, c.x, c.y, d.x, d.y);
        if (hit) {
          const sign = crossProductSign(prev.x, prev.y, pos.x, pos.y, c.x, c.y, d.x, d.y);
          state.twists[state.drag.rope][j] += sign;
          state.twists[j][state.drag.rope] += sign;
        }
      }
      state.drag.prevMouse = { x: pos.x, y: pos.y };

      // Update hover
      state.hoverPeg = hitTestPeg(pos.x, pos.y);
      draw();
      return;
    }

    // Hover detection (no drag)
    if (!state.solved) {
      const pegIdx = hitTestPeg(pos.x, pos.y);
      if (pegIdx !== state.hoverPeg) {
        state.hoverPeg = pegIdx;
        const occupied = pegIdx >= 0 && state.ropeAtPeg[pegIdx] !== null;
        canvas.classList.remove('can-grab', 'can-drop');
        if (occupied) canvas.classList.add('can-grab');
        draw();
      }
    }
  }

  function onPointerUp(e) {
    if (!state.drag) return;
    const pos = getCanvasPos(e);
    const pegIdx = hitTestPeg(pos.x, pos.y);

    // Check if dropping on a valid empty peg
    const isEmptyPeg = pegIdx >= 0 && (
      state.ropeAtPeg[pegIdx] === null // truly empty
    );

    if (isEmptyPeg && pegIdx !== state.drag.fromPeg) {
      // Commit the move
      state.ropes[state.drag.rope].pegs[state.drag.end] = pegIdx;
      state.ropeAtPeg[pegIdx] = { rope: state.drag.rope, end: state.drag.end };
      // fromPeg is already null (freed on pick up)
      state.emptyPeg = state.drag.fromPeg;
      state.moves++;
    } else {
      // Cancel — restore everything
      state.twists = state.drag.savedTwists;
      for (let i = 0; i < state.ropes.length; i++) {
        state.ropes[i].pegs = state.drag.savedRopePegs[i];
      }
      state.ropeAtPeg = state.drag.savedRopeAtPeg;
      state.emptyPeg = state.drag.savedEmpty;
    }

    state.drag = null;
    state.mouse = null;
    canvas.classList.remove('dragging', 'can-grab', 'can-drop');
    draw();
    checkWin();
  }

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', (e) => {
    if (state.drag) onPointerUp(e);
    state.hoverPeg = -1;
    canvas.classList.remove('can-grab', 'can-drop');
  });
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp);
  canvas.addEventListener('touchcancel', (e) => { if (state.drag) onPointerUp(e); });

  // --- Win ---

  function checkWin() {
    if (totalTwists() === 0 && !state.solved && state.moves > 0) {
      state.solved = true;
      winMovesLabel.textContent = state.moves;
      // Brief delay then show overlay
      setTimeout(() => {
        winOverlay.classList.add('visible');
      }, 400);
    }
  }

  // --- Level Management ---

  function updateBandButtons() {
    const level = state.level;
    let active = 'easy';
    if (level >= 18) active = 'expert';
    else if (level >= 10) active = 'hard';
    else if (level >= 5) active = 'medium';
    bandBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.band === active));
  }

  function startLevel(level) {
    state.level = level;
    state.solved = false;
    state.moves = 0;
    state.drag = null;
    state.mouse = null;
    state.hoverPeg = -1;
    winOverlay.classList.remove('visible');
    const numRopes = ropesForLevel(level);
    const numShuffles = shuffleMovesForLevel(level);
    levelLabel.textContent = `Level ${level}`;
    updateBandButtons();
    generateLevel(numRopes, numShuffles);
    draw();
  }

  function restartLevel() {
    startLevel(state.level);
  }

  // --- UI Bindings ---

  bandBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      startLevel(BANDS[btn.dataset.band].startLevel);
      dismissInstructions();
    });
  });

  restartBtn.addEventListener('click', restartLevel);
  nextLevelBtn.addEventListener('click', () => startLevel(state.level + 1));

  // --- Canvas Sizing ---

  function resizeCanvas() {
    const dpr = devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight - header.offsetHeight;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = w * dpr;
    canvas.height = h * dpr;
  }

  window.addEventListener('resize', () => { resizeCanvas(); startLevel(state.level); });

  // --- Init ---
  resizeCanvas();
  startLevel(1);
})();
</script>
</body>
</html>
