<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knots — Puzzle Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: #0b0e17;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
}
h1 {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 3px;
  background: linear-gradient(135deg, #6ee7b7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.subtitle {
  color: #6b7280;
  font-size: 15px;
  margin-bottom: 48px;
  letter-spacing: 0.5px;
}
.games {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: center;
}
.game-card {
  display: flex;
  flex-direction: column;
  width: 340px;
  background: linear-gradient(135deg, #131828 0%, #1a2040 100%);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.game-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  border-color: rgba(255,255,255,0.12);
}
.card-preview {
  height: 180px;
  position: relative;
  overflow: hidden;
}
.card-untangle .card-preview {
  background: radial-gradient(ellipse at center, #131a2e 0%, #0b0e17 70%);
}
.card-ropes .card-preview {
  background: linear-gradient(135deg, #3d2a1a 0%, #4a3222 50%, #3d2a1a 100%);
}
.card-preview canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.card-body {
  padding: 20px 24px 24px;
}
.card-body h2 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 6px;
}
.card-untangle h2 { color: #60a5fa; }
.card-ropes h2 { color: #f5c563; }
.card-body p {
  color: #6b7280;
  font-size: 13px;
  line-height: 1.5;
}
.card-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
  margin-top: 10px;
}
.card-untangle .card-tag {
  background: rgba(96, 165, 250, 0.1);
  color: #60a5fa;
}
.card-ropes .card-tag {
  background: rgba(245, 197, 99, 0.1);
  color: #f5c563;
}
</style>
</head>
<body>
<h1>KNOTS</h1>
<p class="subtitle">Puzzle games about untangling things</p>
<div class="games">
  <a href="untangle.html" class="game-card card-untangle">
    <div class="card-preview"><canvas id="preview-untangle"></canvas></div>
    <div class="card-body">
      <h2>Untangle</h2>
      <p>Classic planarity puzzle. Drag nodes to eliminate all edge crossings in a graph.</p>
      <span class="card-tag">Graph Theory</span>
    </div>
  </a>
  <a href="ropes.html" class="game-card card-ropes">
    <div class="card-preview"><canvas id="preview-ropes"></canvas></div>
    <div class="card-body">
      <h2>Tangle Ropes</h2>
      <p>Drag pins on a board to untangle colorful ropes. Features fixed-pin challenges.</p>
      <span class="card-tag">Rope Physics</span>
    </div>
  </a>
</div>
<script>
(function() {
  const dpr = devicePixelRatio || 1;

  function setupCanvas(id) {
    const c = document.getElementById(id);
    const rect = c.parentElement.getBoundingClientRect();
    c.width = rect.width * dpr;
    c.height = rect.height * dpr;
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w: rect.width, h: rect.height };
  }

  function drawUntanglePreview() {
    const { ctx, w, h } = setupCanvas('preview-untangle');
    const nodes = [
      { x: w*0.25, y: h*0.3 }, { x: w*0.7, y: h*0.2 },
      { x: w*0.55, y: h*0.7 }, { x: w*0.15, y: h*0.75 },
      { x: w*0.8, y: h*0.6 }
    ];
    const edges = [[0,1],[1,2],[2,3],[3,0],[0,2],[1,4],[4,2]];
    const crossed = [false, true, false, false, true, false, false];

    for (let i = 0; i < edges.length; i++) {
      const [a, b] = edges[i];
      if (!crossed[i]) {
        ctx.beginPath();
        ctx.moveTo(nodes[a].x, nodes[a].y);
        ctx.lineTo(nodes[b].x, nodes[b].y);
        ctx.strokeStyle = 'rgba(52, 211, 153, 0.12)';
        ctx.lineWidth = 7;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.moveTo(nodes[a].x, nodes[a].y);
      ctx.lineTo(nodes[b].x, nodes[b].y);
      ctx.strokeStyle = crossed[i] ? 'rgba(239, 68, 68, 0.6)' : '#34d399';
      ctx.lineWidth = crossed[i] ? 1.5 : 2;
      ctx.stroke();
    }
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, 8, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(n.x - 2, n.y - 2, 1, n.x, n.y, 8);
      g.addColorStop(0, '#93c5fd');
      g.addColorStop(1, '#2563eb');
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  function drawRopesPreview() {
    const { ctx, w, h } = setupCanvas('preview-ropes');
    const pins = [
      { x: w*0.2, y: h*0.35 }, { x: w*0.55, y: h*0.2 },
      { x: w*0.8, y: h*0.45 }, { x: w*0.4, y: h*0.75 },
      { x: w*0.65, y: h*0.7 }
    ];
    const ropes = [
      { a:0, b:1, c:'#ef4444' }, { a:1, b:2, c:'#f97316' },
      { a:2, b:3, c:'#22c55e' }, { a:3, b:0, c:'#3b82f6' },
      { a:1, b:3, c:'#a855f7' }, { a:0, b:4, c:'#eab308' },
      { a:4, b:2, c:'#ec4899' }
    ];

    for (const r of ropes) {
      const a = pins[r.a], b = pins[r.b];
      ctx.beginPath();
      ctx.moveTo(a.x + 1, a.y + 2);
      ctx.lineTo(b.x + 1, b.y + 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = r.c;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    for (const pin of pins) {
      ctx.beginPath();
      ctx.arc(pin.x, pin.y, 7, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(pin.x - 2, pin.y - 2, 1, pin.x, pin.y, 7);
      g.addColorStop(0, '#e0e0e0');
      g.addColorStop(1, '#8888a0');
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  drawUntanglePreview();
  drawRopesPreview();
})();
</script>
</body>
</html>
