<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Untangle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #0b0e17;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* --- Header --- */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: linear-gradient(180deg, #131828 0%, #0f1320 100%);
  height: 56px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
#header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
#game-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #6ee7b7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#level-label {
  font-size: 13px;
  color: #8892a8;
  font-weight: 500;
}
#header-center {
  display: flex;
  align-items: center;
  gap: 8px;
}
#crossings-icon {
  width: 18px; height: 18px;
  position: relative;
}
#crossings-icon::before, #crossings-icon::after {
  content: '';
  position: absolute;
  background: #ef4444;
  border-radius: 1px;
  width: 18px; height: 2px;
  top: 8px; left: 0;
  transition: background 0.3s;
}
#crossings-icon::before { transform: rotate(45deg); }
#crossings-icon::after { transform: rotate(-45deg); }
#crossings-icon.solved::before, #crossings-icon.solved::after {
  background: #34d399;
}
#crossings {
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #ef4444;
  transition: color 0.3s;
  min-width: 24px;
  text-align: center;
}
#crossings.solved { color: #34d399; }
#header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
#moves-label {
  font-size: 12px;
  color: #8892a8;
}
#moves {
  font-size: 14px;
  font-weight: 600;
  color: #c4b5fd;
  font-variant-numeric: tabular-nums;
}

/* --- Difficulty Band Buttons --- */
#home-link {
  color: #8892a8;
  text-decoration: none;
  font-size: 13px;
  transition: color 0.15s;
}
#home-link:hover { color: #c8d0e0; }

.band-btn {
  background: rgba(255,255,255,0.04);
  color: #8892a8;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}
.band-btn:hover {
  background: rgba(255,255,255,0.08);
  color: #c8d0e0;
}
.band-btn.active {
  background: rgba(59, 130, 246, 0.15);
  color: #60a5fa;
  border-color: rgba(59, 130, 246, 0.3);
}

/* --- Action Buttons --- */
.action-btn {
  background: rgba(255,255,255,0.04);
  color: #8892a8;
  border: 1px solid rgba(255,255,255,0.08);
  width: 34px; height: 34px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-size: 16px;
  line-height: 1;
}
.action-btn:hover {
  background: rgba(255,255,255,0.08);
  color: #c8d0e0;
}

/* --- Canvas --- */
canvas {
  display: block;
  cursor: default;
  background: radial-gradient(ellipse at center, #131a2e 0%, #0b0e17 70%);
  touch-action: none;
}
canvas.hovering { cursor: grab; }
canvas.dragging { cursor: grabbing; }

/* --- Instructions Toast --- */
#instructions {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(19, 24, 40, 0.92);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  color: #8892a8;
  transition: opacity 0.5s, transform 0.5s;
  pointer-events: none;
  z-index: 5;
}
#instructions.hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(10px);
}
#instructions kbd {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: inherit;
  font-size: 12px;
  color: #a5b4cf;
}

/* --- Win Overlay --- */
#win-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}
#win-overlay.visible { display: flex; }
#win-card {
  background: linear-gradient(135deg, #131828 0%, #1a2040 100%);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 40px 48px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#win-card h2 {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, #6ee7b7, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
#win-stats {
  font-size: 14px;
  color: #8892a8;
  margin-bottom: 24px;
}
#win-stats span { color: #c4b5fd; font-weight: 600; }
#next-level {
  background: linear-gradient(135deg, #34d399, #3b82f6);
  color: #fff;
  border: none;
  padding: 12px 36px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(52, 211, 153, 0.25);
}
#next-level:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(52, 211, 153, 0.35);
}
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <a id="home-link" href="index.html">&larr; Back</a>
    <span id="game-title">UNTANGLE</span>
    <span id="level-label">Level 1</span>
  </div>
  <div id="header-center">
    <div id="crossings-icon"></div>
    <span id="crossings">0</span>
  </div>
  <div id="header-right">
    <span id="moves-label">Moves</span>
    <span id="moves">0</span>
    <div style="width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 4px"></div>
    <button class="band-btn active" data-band="easy">Easy</button>
    <button class="band-btn" data-band="medium">Medium</button>
    <button class="band-btn" data-band="hard">Hard</button>
    <button class="band-btn" data-band="expert">Expert</button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 4px"></div>
    <button class="action-btn" id="restart" title="Restart level">&#x21bb;</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="instructions">Drag the nodes to untangle all the lines</div>

<div id="win-overlay">
  <div id="win-card">
    <h2>Untangled!</h2>
    <div id="win-stats">Solved in <span id="win-moves">0</span> moves</div>
    <button id="next-level">Next Level</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const header = document.getElementById('header');
  const levelLabel = document.getElementById('level-label');
  const crossingsLabel = document.getElementById('crossings');
  const crossingsIcon = document.getElementById('crossings-icon');
  const movesLabel = document.getElementById('moves');
  const winMovesLabel = document.getElementById('win-moves');
  const restartBtn = document.getElementById('restart');
  const winOverlay = document.getElementById('win-overlay');
  const nextLevelBtn = document.getElementById('next-level');
  const instructions = document.getElementById('instructions');
  const bandBtns = document.querySelectorAll('.band-btn');

  const BANDS = {
    easy:   { startLevel: 1 },
    medium: { startLevel: 5 },
    hard:   { startLevel: 10 },
    expert: { startLevel: 18 }
  };

  const state = {
    level: 1,
    nodes: [],
    edges: [],
    edgeCrossed: [],
    crossings: 0,
    dragNode: null,
    hoverNode: null,
    offsetX: 0,
    offsetY: 0,
    solved: false,
    moves: 0,
    instructionsDismissed: false
  };

  // --- Geometry Utilities ---

  function orientation(px, py, qx, qy, rx, ry) {
    const val = (qy - py) * (rx - qx) - (qx - px) * (ry - qy);
    if (Math.abs(val) < 1e-10) return 0;
    return val > 0 ? 1 : 2;
  }

  function segmentsIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
    const o1 = orientation(ax, ay, bx, by, cx, cy);
    const o2 = orientation(ax, ay, bx, by, dx, dy);
    const o3 = orientation(cx, cy, dx, dy, ax, ay);
    const o4 = orientation(cx, cy, dx, dy, bx, by);
    return (o1 !== o2 && o3 !== o4 && o1 !== 0 && o2 !== 0 && o3 !== 0 && o4 !== 0);
  }

  function chordsCrossOnCircle(a, b, c, d, n) {
    if (a > b) { let t = a; a = b; b = t; }
    if (c > d) { let t = c; c = d; d = t; }
    const cInArc = (a < c && c < b);
    const dInArc = (a < d && d < b);
    return cInArc !== dInArc;
  }

  // --- Graph Generation ---

  function nodesForLevel(level) {
    return 3 + level;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generateGraph(nodeCount) {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const cx = w / 2;
    const cy = h / 2;
    const R = Math.min(cx, cy) * 0.65;
    const nodeRadius = Math.max(10, Math.min(18, 220 / nodeCount));

    state.nodes = [];
    for (let i = 0; i < nodeCount; i++) {
      const angle = (2 * Math.PI * i) / nodeCount - Math.PI / 2;
      state.nodes.push({
        x: cx + R * Math.cos(angle),
        y: cy + R * Math.sin(angle),
        radius: nodeRadius
      });
    }

    state.edges = [];
    const edgeSet = new Set();

    function edgeKey(a, b) {
      return a < b ? `${a},${b}` : `${b},${a}`;
    }

    function addEdge(a, b) {
      const key = edgeKey(a, b);
      if (edgeSet.has(key)) return false;
      for (const [ea, eb] of state.edges) {
        if (ea === a || ea === b || eb === a || eb === b) continue;
        if (chordsCrossOnCircle(a, b, ea, eb, nodeCount)) return false;
      }
      edgeSet.add(key);
      state.edges.push([a, b]);
      return true;
    }

    for (let i = 0; i < nodeCount; i++) {
      const key = edgeKey(i, (i + 1) % nodeCount);
      edgeSet.add(key);
      state.edges.push([i, (i + 1) % nodeCount]);
    }

    const maxSkip = Math.max(2, Math.floor(nodeCount / 3));
    const candidates = [];
    for (let skip = 2; skip <= maxSkip; skip++) {
      for (let i = 0; i < nodeCount; i++) {
        candidates.push([i, (i + skip) % nodeCount]);
      }
    }
    shuffle(candidates);

    const targetEdges = Math.floor(2 * nodeCount);
    for (const [a, b] of candidates) {
      if (state.edges.length >= targetEdges) break;
      addEdge(a, b);
    }

    scrambleNodes();

    for (let attempts = 0; attempts < 10; attempts++) {
      countCrossings();
      if (state.crossings > 0) break;
      scrambleNodes();
    }
  }

  function scrambleNodes() {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    // Scatter within central 70% of canvas
    const marginX = w * 0.15;
    const marginY = h * 0.15;
    for (const node of state.nodes) {
      node.x = marginX + Math.random() * (w - 2 * marginX);
      node.y = marginY + Math.random() * (h - 2 * marginY);
    }
  }

  // --- Crossing Detection ---

  function countCrossings() {
    const edges = state.edges;
    const nodes = state.nodes;
    state.edgeCrossed = new Array(edges.length).fill(false);
    let count = 0;

    for (let i = 0; i < edges.length; i++) {
      for (let j = i + 1; j < edges.length; j++) {
        const [a, b] = edges[i];
        const [c, d] = edges[j];
        if (a === c || a === d || b === c || b === d) continue;
        if (segmentsIntersect(
          nodes[a].x, nodes[a].y, nodes[b].x, nodes[b].y,
          nodes[c].x, nodes[c].y, nodes[d].x, nodes[d].y
        )) {
          count++;
          state.edgeCrossed[i] = true;
          state.edgeCrossed[j] = true;
        }
      }
    }
    state.crossings = count;
  }

  // --- Rendering ---

  function draw() {
    const dpr = devicePixelRatio;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;
    ctx.clearRect(0, 0, w, h);

    const edges = state.edges;
    const nodes = state.nodes;

    // Draw edges with glow for uncrossed
    for (let i = 0; i < edges.length; i++) {
      const [a, b] = edges[i];
      const crossed = state.edgeCrossed[i];

      if (!crossed) {
        // Soft glow for solved edges
        ctx.beginPath();
        ctx.moveTo(nodes[a].x, nodes[a].y);
        ctx.lineTo(nodes[b].x, nodes[b].y);
        ctx.strokeStyle = 'rgba(52, 211, 153, 0.15)';
        ctx.lineWidth = 8;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.moveTo(nodes[a].x, nodes[a].y);
      ctx.lineTo(nodes[b].x, nodes[b].y);
      ctx.strokeStyle = crossed ? 'rgba(239, 68, 68, 0.7)' : '#34d399';
      ctx.lineWidth = crossed ? 2 : 2.5;
      ctx.stroke();
    }

    // Draw nodes
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const isDragging = (state.dragNode === i);
      const isHovering = (state.hoverNode === i);
      const r = n.radius;

      // Outer glow
      if (isDragging || isHovering) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 6, 0, 2 * Math.PI);
        ctx.fillStyle = isDragging
          ? 'rgba(251, 191, 36, 0.15)'
          : 'rgba(96, 165, 250, 0.12)';
        ctx.fill();
      }

      // Shadow
      ctx.beginPath();
      ctx.arc(n.x + 1, n.y + 2, r, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();

      // Node body
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, 2 * Math.PI);
      const grad = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, r * 0.1, n.x, n.y, r);
      if (isDragging) {
        grad.addColorStop(0, '#fde68a');
        grad.addColorStop(1, '#f59e0b');
      } else if (isHovering) {
        grad.addColorStop(0, '#93c5fd');
        grad.addColorStop(1, '#3b82f6');
      } else {
        grad.addColorStop(0, '#60a5fa');
        grad.addColorStop(1, '#2563eb');
      }
      ctx.fillStyle = grad;
      ctx.fill();

      // Border
      ctx.strokeStyle = isDragging
        ? 'rgba(251, 191, 36, 0.6)'
        : 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Specular highlight
      ctx.beginPath();
      ctx.arc(n.x - r * 0.25, n.y - r * 0.25, r * 0.35, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fill();
    }

    // Update header
    crossingsLabel.textContent = state.crossings;
    crossingsLabel.className = state.crossings === 0 ? 'solved' : '';
    crossingsIcon.className = state.crossings === 0 ? 'solved' : '';
    movesLabel.textContent = state.moves;
  }

  // --- Interaction ---

  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function hitTestNode(mx, my) {
    for (let i = state.nodes.length - 1; i >= 0; i--) {
      const n = state.nodes[i];
      const dx = mx - n.x;
      const dy = my - n.y;
      if (dx * dx + dy * dy <= (n.radius + 6) * (n.radius + 6)) {
        return i;
      }
    }
    return -1;
  }

  function dismissInstructions() {
    if (!state.instructionsDismissed) {
      state.instructionsDismissed = true;
      instructions.classList.add('hidden');
    }
  }

  function onPointerDown(e) {
    if (state.solved) return;
    e.preventDefault();
    dismissInstructions();
    const pos = getCanvasPos(e);
    const idx = hitTestNode(pos.x, pos.y);
    if (idx >= 0) {
      state.dragNode = idx;
      state.offsetX = pos.x - state.nodes[idx].x;
      state.offsetY = pos.y - state.nodes[idx].y;
      canvas.classList.remove('hovering');
      canvas.classList.add('dragging');
      draw();
    }
  }

  function onPointerMove(e) {
    const pos = getCanvasPos(e);

    if (state.dragNode !== null) {
      e.preventDefault();
      state.nodes[state.dragNode].x = pos.x - state.offsetX;
      state.nodes[state.dragNode].y = pos.y - state.offsetY;
      countCrossings();
      draw();
      return;
    }

    // Hover detection
    if (!state.solved) {
      const idx = hitTestNode(pos.x, pos.y);
      if (idx !== state.hoverNode) {
        state.hoverNode = idx >= 0 ? idx : null;
        canvas.classList.toggle('hovering', idx >= 0);
        draw();
      }
    }
  }

  function onPointerUp(e) {
    if (state.dragNode === null) return;
    state.moves++;
    state.dragNode = null;
    canvas.classList.remove('dragging');
    countCrossings();
    draw();
    checkWin();
  }

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', (e) => {
    if (state.dragNode !== null) onPointerUp(e);
    if (state.hoverNode !== null) {
      state.hoverNode = null;
      canvas.classList.remove('hovering');
      draw();
    }
  });
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp);
  canvas.addEventListener('touchcancel', onPointerUp);

  // --- Win Detection ---

  function checkWin() {
    if (state.crossings === 0 && !state.solved) {
      state.solved = true;
      winMovesLabel.textContent = state.moves;
      winOverlay.classList.add('visible');
    }
  }

  // --- Level Management ---

  function updateBandButtons() {
    const level = state.level;
    let active = 'easy';
    if (level >= 18) active = 'expert';
    else if (level >= 10) active = 'hard';
    else if (level >= 5) active = 'medium';
    bandBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.band === active);
    });
  }

  function startLevel(level) {
    state.level = level;
    state.solved = false;
    state.moves = 0;
    state.hoverNode = null;
    state.dragNode = null;
    winOverlay.classList.remove('visible');
    const nodeCount = nodesForLevel(level);
    levelLabel.textContent = `Level ${level}`;
    updateBandButtons();
    generateGraph(nodeCount);
    draw();
  }

  function nextLevel() {
    startLevel(state.level + 1);
  }

  function restartLevel() {
    state.solved = false;
    state.moves = 0;
    state.hoverNode = null;
    state.dragNode = null;
    winOverlay.classList.remove('visible');
    scrambleNodes();
    for (let attempts = 0; attempts < 10; attempts++) {
      countCrossings();
      if (state.crossings > 0) break;
      scrambleNodes();
    }
    draw();
  }

  // --- UI Bindings ---

  bandBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const band = BANDS[btn.dataset.band];
      startLevel(band.startLevel);
      dismissInstructions();
    });
  });

  restartBtn.addEventListener('click', restartLevel);
  nextLevelBtn.addEventListener('click', nextLevel);

  // --- Canvas Sizing ---

  function resizeCanvas() {
    const dpr = devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight - header.offsetHeight;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = w * dpr;
    canvas.height = h * dpr;
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    draw();
  });

  // --- Init ---

  resizeCanvas();
  startLevel(1);

  // Expose state for testing
  window.__gameState = state;
  window.__startLevel = startLevel;
})();
</script>
</body>
</html>
